<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineering Workshop — Visma 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#67a870; --green-dim:#2d7048; --green-glow:rgba(103,168,112,.18);
  --blue:#419bd7; --blue-dim:#0d5788;
  --orange:#e5a23e; --orange-dim:#b35300;
  --red:#db6b7d; --red-dim:#a12036;
  --purple:#8a80bd;
  --bg:#0c0f12; --surface:#141920; --surface2:#1c232c;
  --border:rgba(255,255,255,.07);
  --text:#e8edf2; --muted:#9aaab8; --faint:#3a4550;
  --accent:var(--green);
  --code-bg:#06080a;
  --code-label-bg:rgba(255,255,255,.02);
  --dot-color:rgba(255,255,255,.035);
  --ghost-color:rgba(255,255,255,.025);
  --nav-bg:rgba(12,15,18,.9);
  --btn-hover-bg:rgba(255,255,255,.06);
  --expand-btn-bg:rgba(255,255,255,.05);
  --expand-btn-hover-bg:rgba(255,255,255,.1);
  --expand-btn-hover-border:rgba(255,255,255,.2);
  --backdrop-bg:rgba(0,0,0,.72);
  --f-head:'Ubuntu',sans-serif;
  --f-mono:'JetBrains Mono',monospace;
  /* tint backgrounds — override in light mode for visibility */
  --tint-green:rgba(103,168,112,.08);
  --tint-blue:rgba(65,155,215,.08);
  --tint-orange:rgba(229,162,62,.08);
  --tint-red:rgba(219,107,125,.08);
  --tint-purple:rgba(138,128,189,.08);
  --tint-green-border:rgba(103,168,112,.3);
  --tint-blue-border:rgba(65,155,215,.3);
  --tint-orange-border:rgba(229,162,62,.3);
  --tint-red-border:rgba(219,107,125,.3);
  --tint-purple-border:rgba(138,128,189,.3);
  --surface-ghost:rgba(255,255,255,.03);
  --border-ghost:rgba(255,255,255,.1);
  --danger-surface:#1a0808;
  --danger-border:#3a1010;
}
[data-theme="light"] {
  --bg:#e2e8ee; --surface:#ffffff; --surface2:#d8e0e8;
  --border:rgba(0,0,0,.13);
  --text:#1a2330; --muted:#4a5a68; --faint:#6e808f;
  --green:#2a8c3c; --green-dim:#1a5c28; --green-glow:rgba(42,140,60,.15);
  --blue:#1a7abf; --blue-dim:#0d5788;
  --orange:#c47a10; --orange-dim:#8c5200;
  --red:#c03050; --red-dim:#901030;
  --purple:#6055a0;
  --code-bg:#1e2530;
  --code-label-bg:rgba(255,255,255,.04);
  --dot-color:rgba(0,0,0,.045);
  --ghost-color:rgba(0,0,0,.04);
  --nav-bg:rgba(240,244,248,.92);
  --btn-hover-bg:rgba(0,0,0,.05);
  --expand-btn-bg:rgba(0,0,0,.04);
  --expand-btn-hover-bg:rgba(0,0,0,.08);
  --expand-btn-hover-border:rgba(0,0,0,.18);
  --backdrop-bg:rgba(0,0,0,.65);
  /* stronger tints for light mode — dark-mode values are nearly invisible on white */
  --tint-green:rgba(42,140,60,.15);
  --tint-blue:rgba(26,122,191,.13);
  --tint-orange:rgba(196,122,16,.13);
  --tint-red:rgba(192,48,80,.13);
  --tint-purple:rgba(96,85,160,.13);
  --tint-green-border:rgba(42,140,60,.5);
  --tint-blue-border:rgba(26,122,191,.45);
  --tint-orange-border:rgba(196,122,16,.45);
  --tint-red-border:rgba(192,48,80,.45);
  --tint-purple-border:rgba(96,85,160,.45);
  --surface-ghost:rgba(0,0,0,.04);
  --border-ghost:rgba(0,0,0,.15);
  --danger-surface:rgba(192,48,80,.1);
  --danger-border:rgba(192,48,80,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--f-head)}

/* ── ENGINE ── */
.deck{position:relative;width:100vw;height:100vh}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:opacity .35s cubic-bezier(.4,0,.2,1),transform .35s cubic-bezier(.4,0,.2,1);transform:translateX(28px)}
.slide.active{opacity:1;visibility:visible;transform:none}
.slide.prev{transform:translateX(-28px)}

/* ── CHROME ── */
.progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--green-dim),var(--green));box-shadow:0 0 10px var(--green-glow);transition:width .4s ease;z-index:200}
.wordmark{position:fixed;top:22px;left:36px;z-index:100;display:flex;align-items:center;gap:10px;opacity:.45}
.wordmark-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.wordmark-text{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text)}
.wordmark-logo{display:none;height:28px;width:auto}
[data-theme="light"] .wordmark{opacity:1;top:18px;left:30px;gap:0}
[data-theme="light"] .wordmark-dot{display:none}
[data-theme="light"] .wordmark-text{display:none}
[data-theme="light"] .wordmark-logo{display:block;mix-blend-mode:multiply;opacity:.82}
.nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;background:var(--nav-bg);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:40px;padding:6px 8px;gap:0}
.nav-btn{width:40px;height:40px;border-radius:30px;border:none;background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;font-family:var(--f-head);font-weight:700}
.nav-btn:hover{background:var(--btn-hover-bg);color:var(--text)}
.nav-btn:active{background:var(--green-glow);color:var(--green)}
.nav-counter{font-family:var(--f-mono);font-size:11px;color:var(--faint);padding:0 16px;min-width:68px;text-align:center;letter-spacing:.05em}
.nav-sep{width:1px;height:18px;background:var(--border);margin:0 4px;flex-shrink:0}
.slide-num{position:fixed;top:22px;right:36px;z-index:100;font-family:var(--f-mono);font-size:11px;color:var(--faint);letter-spacing:.08em}

/* ── LAYOUT ATOMS ── */
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:100%;padding:60px 80px;position:relative}
.left{display:flex;flex-direction:column;justify-content:center;height:100%;padding:72px 100px;position:relative;overflow:hidden}
.split{display:flex;height:100%}
.split-l{width:46%;display:flex;flex-direction:column;justify-content:center;padding:72px 72px;border-right:1px solid var(--border);position:relative;overflow:hidden}
.split-r{flex:1;display:flex;flex-direction:column;justify-content:center;padding:72px 72px;overflow:hidden}

/* ── TYPOGRAPHY SCALE (TV-optimised) ── */
.eyebrow{font-family:var(--f-mono);font-size:14px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
.eyebrow-green{color:var(--green)}
.eyebrow-blue{color:var(--blue)}
.eyebrow-orange{color:var(--orange)}
.eyebrow-red{color:var(--red)}
h1{font-size:clamp(64px,7.5vw,96px);font-weight:900;line-height:1.02;letter-spacing:-.03em}
h2{font-size:clamp(44px,5vw,64px);font-weight:700;line-height:1.06;letter-spacing:-.02em;margin-bottom:28px}
h3{font-size:clamp(22px,2.4vw,30px);font-weight:600;line-height:1.2;letter-spacing:-.01em}
.body-lg{font-size:clamp(20px,2vw,26px);line-height:1.55;color:var(--muted);font-weight:400}
.body-md{font-size:clamp(17px,1.7vw,22px);line-height:1.6;color:var(--muted)}
.body-sm{font-size:clamp(15px,1.4vw,18px);line-height:1.6;color:var(--muted)}
.accent{color:var(--green)}
.blue{color:var(--blue)}
.orange{color:var(--orange)}
.red{color:var(--red)}
.dim{color:var(--muted)}

code,.mono{font-family:var(--f-mono);font-size:.9em;color:var(--green);background:rgba(103,168,112,.12);padding:2px 7px;border-radius:4px}
[data-theme="light"] code,[data-theme="light"] .mono{background:rgba(42,140,60,.18);}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 32px;transition:border-color .2s}
.card-grid{display:grid;gap:16px}
.card-grid.cols2{grid-template-columns:1fr 1fr}
.card-grid.cols3{grid-template-columns:1fr 1fr 1fr}

/* ── CHIP ── */
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:15px;font-weight:500;font-family:var(--f-mono);border:1px solid var(--border)}
.chip-green{color:var(--green);background:rgba(103,168,112,.1);border-color:rgba(103,168,112,.3)}
.chip-blue{color:var(--blue);background:rgba(65,155,215,.1);border-color:rgba(65,155,215,.3)}
.chip-orange{color:var(--orange);background:rgba(229,162,62,.1);border-color:rgba(229,162,62,.3)}
.chip-red{color:var(--red);background:rgba(219,107,125,.1);border-color:rgba(219,107,125,.3)}
.chip-purple{color:var(--purple);background:rgba(138,128,189,.1);border-color:rgba(138,128,189,.3)}

/* ── QUOTE SLIDE ── */
.quote-mark{font-size:120px;line-height:.6;color:var(--green);font-weight:900;margin-bottom:16px;opacity:.4}
.quote-text{font-size:clamp(26px,3vw,38px);line-height:1.4;font-weight:400;max-width:900px;color:var(--text)}
.quote-attr{font-size:16px;color:var(--muted);margin-top:28px;font-family:var(--f-mono);letter-spacing:.05em}

/* ── WORKFLOW STEPS ── */
.wf{display:flex;align-items:center;gap:0;flex-wrap:wrap}
.wf-box{padding:14px 24px;border-radius:12px;font-family:var(--f-mono);font-size:17px;font-weight:600;border:1px solid var(--border);background:var(--surface);white-space:nowrap}
.wf-arrow{color:var(--faint);font-size:22px;padding:0 6px}
.wf-box.blue{border-color:rgba(65,155,215,.4);background:rgba(65,155,215,.08);color:var(--blue)}
.wf-box.orange{border-color:rgba(229,162,62,.4);background:rgba(229,162,62,.08);color:var(--orange)}
.wf-box.green{border-color:rgba(103,168,112,.4);background:rgba(103,168,112,.08);color:var(--green)}
.wf-box.red{border-color:rgba(219,107,125,.4);background:rgba(219,107,125,.08);color:var(--red)}
.wf-box.purple{border-color:rgba(138,128,189,.4);background:rgba(138,128,189,.08);color:var(--purple)}

/* ── CODE ── */
.code-block{background:var(--code-bg);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.code-label{font-family:var(--f-mono);font-size:13px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--code-label-bg)}
pre{padding:20px 22px;font-family:var(--f-mono);font-size:17px;line-height:1.75;overflow-x:auto;color:#c8d8e4}
.k{color:#8a80bd}.s{color:#9fd49f}.c{color:#556a7a;font-style:italic}
.n{color:#419bd7}.v{color:#e5a23e}.cm{color:#67a870;font-weight:600}
.code-block{position:relative;transition:box-shadow .3s ease}
.code-expand-btn{position:absolute;top:6px;right:8px;width:28px;height:28px;border-radius:6px;background:var(--expand-btn-bg);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:13px;line-height:1;transition:all .2s;z-index:2;padding:0}
.code-expand-btn:hover{background:var(--expand-btn-hover-bg);color:#e8edf2;border-color:var(--expand-btn-hover-border)}
.code-backdrop{position:fixed;inset:0;background:var(--backdrop-bg);backdrop-filter:blur(4px);z-index:999;opacity:0;pointer-events:none;transition:opacity .3s ease}
.code-backdrop.is-active{opacity:1;pointer-events:auto}
.code-block.is-expanded{position:fixed;top:5vh;left:5vw;right:5vw;bottom:5vh;max-width:none !important;z-index:1000;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:codeExpandIn .35s cubic-bezier(.2,.8,.2,1) both}
.code-block.is-expanded pre{max-height:none !important;flex:1;overflow-y:auto;font-size:16px;padding:28px 32px}
.code-block.is-expanded .code-label{padding:14px 22px;font-size:12px}
@keyframes codeExpandIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}

/* ── BACKGROUNDS ── */
.dot-grid{position:absolute;inset:0;background-image:radial-gradient(circle,var(--dot-color) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
.bg-glow-green{position:absolute;top:-20%;right:-10%;width:55%;aspect-ratio:1;background:radial-gradient(circle,rgba(103,168,112,.07) 0%,transparent 65%);pointer-events:none}
.bg-glow-blue{position:absolute;bottom:-20%;left:-10%;width:55%;aspect-ratio:1;background:radial-gradient(circle,rgba(65,155,215,.06) 0%,transparent 65%);pointer-events:none}
.section-num{position:absolute;right:-20px;bottom:-20px;font-size:clamp(130px,18vw,220px);font-weight:900;color:var(--ghost-color);line-height:1;pointer-events:none;user-select:none;letter-spacing:-.04em}

/* ── AGENDA ── */
.agenda-row{display:flex;align-items:flex-start;gap:24px;padding:16px 0;border-bottom:1px solid var(--border)}
.agenda-row:last-child{border-bottom:none}
.agenda-time{font-family:var(--f-mono);font-size:15px;color:var(--green);width:70px;flex-shrink:0;padding-top:3px}
.agenda-title{font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px}
.agenda-desc{font-size:18px;color:var(--muted)}

/* ── SECTION DIVIDER ── */
.divider-slide .center{gap:20px}

/* ── BIG STAT ── */
.big-stat{font-size:clamp(80px,10vw,130px);font-weight:900;line-height:1;letter-spacing:-.04em}

/* ── LIGHT MODE OVERRIDES ── */
[data-theme="light"] .card{box-shadow:0 2px 10px rgba(0,0,0,.1);border-color:rgba(0,0,0,.12)}
[data-theme="light"] .chip-green{background:rgba(42,140,60,.18);border-color:rgba(42,140,60,.5)}
[data-theme="light"] .chip-blue{background:rgba(26,122,191,.16);border-color:rgba(26,122,191,.5)}
[data-theme="light"] .chip-orange{background:rgba(196,122,16,.16);border-color:rgba(196,122,16,.5)}
[data-theme="light"] .chip-red{background:rgba(192,48,80,.16);border-color:rgba(192,48,80,.5)}
[data-theme="light"] .chip-purple{background:rgba(96,85,160,.16);border-color:rgba(96,85,160,.5)}
[data-theme="light"] .wf-box.blue{background:rgba(26,122,191,.18);border-color:rgba(26,122,191,.55)}
[data-theme="light"] .wf-box.orange{background:rgba(196,122,16,.18);border-color:rgba(196,122,16,.55)}
[data-theme="light"] .wf-box.green{background:rgba(42,140,60,.18);border-color:rgba(42,140,60,.55)}
[data-theme="light"] .wf-box.red{background:rgba(192,48,80,.18);border-color:rgba(192,48,80,.55)}
[data-theme="light"] .wf-box.purple{background:rgba(96,85,160,.18);border-color:rgba(96,85,160,.55)}

</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="wordmark"><div class="wordmark-dot"></div><span class="wordmark-text">Visma</span><img class="wordmark-logo" src="assets/visma_logo.png" alt="Visma"></div>
<div class="slide-num" id="slideNum"></div>
<div class="deck" id="deck">
